    <path d="M313 244l50-24 63 20 31 45-28 54-57 30-55-33-32-58z"/>
    <path d="M542 146l72-22 83 18 59 40 7 58-49 24-99-12-89 11-54-28 18-58z"/>
    <path d="M734 283l45-36 58 14 39 48-10 67-53 42-61-31-36-59z"/>
    <path d="M832 156l68-45 121 12 74 44-18 52-91 20-103-11-66 18-43-28 10-42z"/>
    <path d="M936 300l83-19 55 33-9 55-54 38-68-25-29-43z"/>
