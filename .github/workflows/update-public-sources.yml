name: Update public source signals

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-public-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch public source signals
        run: python update_sources.py --signals-output data/latest_signals.json --candidate-output data/candidate_events.json

      - name: Commit updated signals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest_signals.json
          if git diff --cached --quiet; then
            echo "No public signal changes to commit."
          else
            git commit -m "Update public source signals"
            git push
          fi
